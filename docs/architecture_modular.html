<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Autonomy System - Architecture Visualization</title>
    
    <!-- Внешние ресурсы -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
    
    <!-- Локальные ресурсы -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <header class="header">
            <h1>🚀 Система Мини-Автономии</h1>
            <p>Архитектура модулей и потоков данных</p>
        </header>

        <!-- Навигация по вкладкам -->
        <nav class="nav-tabs">
            <button class="nav-tab active" onclick="showTab(event, 'modules')">Зависимости модулей</button>
            <button class="nav-tab" onclick="showTab(event, 'pipeline')">Конвейер (Pipeline)</button>
            <button class="nav-tab" onclick="showTab(event, 'async')">Асинхронная модель</button>
            <button class="nav-tab" onclick="showTab(event, 'classes')">Классы</button>
            <button class="nav-tab" onclick="showTab(event, 'dataflow')">Поток данных</button>
            <button class="nav-tab" onclick="showTab(event, 'threads')">Потоки</button>
            <button class="nav-tab" onclick="showTab(event, 'performance')">Производительность</button>
        </nav>

        <!-- Контент вкладок -->
        <main class="content" id="content">
            <!-- Содержимое будет генерироваться динамически -->
        </main>
    </div>

    <script>
        // Конфигурация диаграмм
        const diagramConfig = [
            { id: 'modules', title: 'Иерархия модулей', file: 'diagrams/modules.mmd' },
            { id: 'pipeline', title: 'Архитектура Pipeline', file: 'diagrams/pipeline.mmd' },
            { id: 'async', title: 'Асинхронная архитектура', file: 'diagrams/async.mmd' },
            { id: 'classes', title: 'Диаграмма классов', file: 'diagrams/classes.mmd' },
            { id: 'dataflow', title: 'Поток данных', file: 'diagrams/dataflow.mmd' },
            { id: 'threads', title: 'Архитектура потоков', file: 'diagrams/threads.mmd' },
            { id: 'performance', title: 'Метрики производительности', file: 'diagrams/performance.mmd' }
        ];

        // Кэш для загруженных диаграмм
        const diagramCache = {};

        // Загрузка диаграммы из файла
        async function loadDiagram(file) {
            if (diagramCache[file]) {
                return diagramCache[file];
            }

            try {
                const response = await fetch(file);
                if (!response.ok) {
                    throw new Error(`Failed to load ${file}: ${response.status}`);
                }
                const content = await response.text();
                diagramCache[file] = content;
                return content;
            } catch (error) {
                console.error('Error loading diagram:', error);
                return `graph TD\n    Error[Ошибка загрузки диаграммы]\n    Error --> ${file}`;
            }
        }

        // Генерация контента вкладок
        async function generateContent() {
            const content = document.getElementById('content');
            let html = '';

            for (const tab of diagramConfig) {
                const diagramContent = await loadDiagram(tab.file);
                html += `
                    <section id="${tab.id}" class="tab-pane">
                        <h2>${tab.title}</h2>
                        <div class="mermaid">
                            ${diagramContent}
                        </div>
                    </section>
                `;
            }

            content.innerHTML = html;
        }

        // Функция переключения вкладок
        function showTab(event, tabName) {
            // Скрываем все вкладки
            const tabs = document.getElementsByClassName('tab-pane');
            for (let i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            
            // Убираем активный класс у кнопок
            const buttons = document.getElementsByClassName('nav-tab');
            for (let i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            
            // Показываем выбранную вкладку
            const targetTab = document.getElementById(tabName);
            if (targetTab) {
                targetTab.classList.add('active');
                
                // Инициализируем Mermaid для новой видимой вкладки
                mermaid.run({
                    nodes: targetTab.querySelectorAll('.mermaid')
                }).catch(err => console.error("Mermaid run error:", err));
            }
            
            // Активируем кнопку
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
        }

        // Инициализация при загрузке страницы
        document.addEventListener('DOMContentLoaded', async function() {
            // Инициализация Mermaid
            mermaid.initialize({ 
                startOnLoad: false, 
                securityLevel: 'loose', 
                theme: 'default' 
            });
            
            // Генерация контента
            await generateContent();
            
            // Показываем первую вкладку
            showTab({ currentTarget: document.querySelector('.nav-tab.active') }, 'modules');
        });
    </script>
</body>
</html>
